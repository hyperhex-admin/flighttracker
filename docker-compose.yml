services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: traffic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./index.html:/app/index.html
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: traffic
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres

  ingestor:
    build:
      context: .
      dockerfile: ingestor.Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: traffic
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres

  historical:
    build:
      context: .
      dockerfile: ingestor.Dockerfile
    env_file:
      - .env
    command: ["python", "historical_ingestor.py"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: traffic
      DB_USER: postgres
      DB_PASSWORD: postgres
      HISTORY_DAYS: 7
    depends_on:
      - postgres

volumes:
  postgres_data:
