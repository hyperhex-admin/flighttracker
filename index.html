<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Nomad Tracker</title>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotatedmarker@0.2.0/leaflet.rotatedmarker.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        #map { height: 100vh; }
        
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .plane-icon { filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.6)); }
        .ship-icon { filter: drop-shadow(0 0 4px rgba(16, 185, 129, 0.6)); }
        
        .leaflet-popup-content-wrapper {
            background: rgba(15, 23, 42, 0.95) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 10px !important;
            color: #f1f5f9;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: auto !important;
            min-width: 220px;
            max-width: 240px;
            padding: 0;
            overflow: visible;
        }
        
        .leaflet-popup-tip {
            background: rgba(15, 23, 42, 0.95) !important;
            border-right: 1px solid rgba(71, 85, 105, 0.5);
            border-bottom: 1px solid rgba(71, 85, 105, 0.5);
        }
        
        .leaflet-popup-content {
            margin: 0;
            overflow: visible;
        }
        
        .leaflet-popup-content > div {
            overflow: visible;
        }
        
        .leaflet-popup-close-button {
            color: #64748b !important;
            font-size: 20px !important;
            padding: 8px !important;
            right: 4px !important;
            top: 4px !important;
        }
        
        .leaflet-popup-close-button:hover {
            color: white !important;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        input, select {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        .btn {
            transition: all 0.2s ease;
            transform: translateY(0);
        }
        
        .btn:hover {
            transform: translateY(-1px);
        }
        
        .btn:active {
            transform: translateY(0);
        }

        .popup-content {
            min-width: 160px;
            width: 160px;
            font-size: 11px;
        }
        
        .custom-popup .leaflet-popup-content {
            margin: 6px 8px;
            width: auto !important;
        }
        
        .custom-popup .leaflet-popup-content-wrapper {
            padding: 6px 8px;
        }
        
        .popup-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        
        .popup-icon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .popup-icon svg {
            width: 12px;
            height: 12px;
        }
        
        .popup-title {
            color: white;
            font-weight: 600;
            font-size: 11px;
        }
        
        .popup-country {
            color: #94a3b8;
            font-size: 9px;
        }
        
        .popup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            margin-bottom: 4px;
        }
        
        .popup-stat {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 3px;
            padding: 2px 3px;
            overflow: hidden;
        }
        
        .popup-stat-label {
            color: #64748b;
            font-size: 9px;
        }
        
        .popup-stat-value {
            color: white;
            font-weight: 500;
            font-size: 9px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .popup-btn {
            background: #2563eb;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .popup-btn:hover {
            background: #3b82f6;
        }
        
        .popup-btn:active {
            transform: scale(0.98);
        }
        
        .popup-meta {
            font-size: 9px;
            color: #64748b;
            margin-top: 4px;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(100, 116, 139, 0.5); border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-900">
    <div id="map"></div>
    
    <!-- Header Overlay -->
    <div class="fixed top-4 left-4 right-4 z-[1000]">
        <div class="glass rounded-2xl px-6 py-4 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-white font-bold text-lg">Global Nomad Tracker</h1>
                    <p class="text-slate-400 text-xs">Real-time flight tracking</p>
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="stat-card rounded-xl px-4 py-2 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-blue-400" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-slate-400 text-xs">Flights</p>
                        <p class="text-white font-bold" id="flight-count">0</p>
                    </div>
                </div>
                
                <div class="stat-card rounded-xl px-4 py-2 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-emerald-400" fill="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-slate-400 text-xs">Status</p>
                        <p class="text-emerald-400 font-semibold text-sm">Live</p>
                    </div>
                </div>
                
                <button onclick="refreshMap()" class="btn bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white px-4 py-2 rounded-xl font-medium text-sm flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Refresh
                </button>
            </div>
        </div>
    </div>
    
    <!-- Controls Panel -->
    <div class="fixed bottom-6 left-4 z-[1000]">
        <div class="glass rounded-2xl p-4 w-72">
            <div class="flex items-center gap-2 mb-4">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
                </svg>
                <span class="text-white font-medium text-sm">Filters</span>
            </div>
            
            <div class="space-y-3">
                <div>
                    <label class="text-slate-400 text-xs block mb-1">Country</label>
                    <input type="text" id="filter-country" placeholder="e.g. Germany" 
                           class="w-full px-3 py-2 rounded-lg text-white text-sm">
                </div>
                
                <div>
                    <label class="text-slate-400 text-xs block mb-1">Flight ID (ICAO24)</label>
                    <input type="text" id="filter-id" placeholder="e.g. 4AC9C4" 
                           class="w-full px-3 py-2 rounded-lg text-white text-sm uppercase">
                </div>
                
                <div>
                    <label class="text-slate-400 text-xs block mb-1">History Range</label>
                    <select id="history-minutes" class="w-full px-3 py-2 rounded-lg text-white text-sm">
                        <option value="5">5 minutes</option>
                        <option value="15">15 minutes</option>
                        <option value="30">30 minutes</option>
                        <option value="60" selected>1 hour</option>
                        <option value="180">3 hours</option>
                        <option value="360">6 hours</option>
                        <option value="1440">24 hours</option>
                        <option value="4320">3 days</option>
                        <option value="10080">7 days</option>
                    </select>
                </div>
                
                <div>
                    <label class="text-slate-400 text-xs block mb-1">Date</label>
                    <input type="date" id="filter-date" class="w-full px-3 py-2 rounded-lg text-white text-sm">
                </div>
            </div>
            
            <div class="mt-4 pt-4 border-t border-slate-700/50 space-y-2">
                <button onclick="showFlightList()" class="btn bg-gradient-to-r from-purple-600 to-purple-500 hover:from-purple-500 hover:to-purple-400 text-white px-4 py-2 rounded-xl font-medium text-sm w-full flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    Flight History
                </button>
                
                <button onclick="togglePlayback()" id="play-btn" class="btn bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-white px-4 py-2 rounded-xl font-medium text-sm w-full flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    Play Path
                </button>
            </div>
            
            <div id="playback-time" class="mt-3 text-center text-slate-400 text-sm font-mono hidden"></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api/v1/traffic';
        const PATH_API = window.location.origin + '/api/v1/path/';
        const TIME_API = window.location.origin + '/api/v1/time-range';
        
        const map = L.map('map', {
            zoomControl: false
        }).setView([20, 0], 3);
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 18
        }).addTo(map);

        map.on('popupopen', function() {
            document.querySelectorAll('.popup-btn').forEach(btn => {
                btn.onclick = function(e) {
                    const flightId = e.target.getAttribute('data-flight-id');
                    showPath(flightId);
                };
            });
        });

        const planeIcon = L.divIcon({
            className: 'plane-icon',
            html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="#3B82F6"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14]
        });

        const shipIcon = L.divIcon({
            className: 'ship-icon',
            html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="#10B981"><path d="M20 21c-1.39 0-2.78-.47-4-1.32-2.44-1.71-5.56-1.71-8 0-1.22.85-2.61 1.32-4 1.32v-2c1.38 0 2.74-.35 4-.99 2.52-1.29 5.48-1.29 8 0 1.26.64 2.62.99 4 .99v-2zM12 4l-8 4v4h16v-4l-8-4zm0 7c-1.66 0-3-1.34-3-3 0-1.66 1.34-3 3-3s3 1.34 3 3-1.34 3-3 3z"/></svg>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14]
        });

        const markers = new Map();
        let selectedFlightId = null;
        let pathLayer = null;
        let playbackMode = false;
        let playbackInterval = null;
        let playbackData = [];

        document.getElementById('filter-country').addEventListener('change', refreshMap);
        document.getElementById('filter-id').addEventListener('input', refreshMap);
        document.getElementById('history-minutes').addEventListener('change', onHistoryChange);
        document.getElementById('filter-date').addEventListener('change', onHistoryChange);

        async function fetchTraffic() {
            const country = document.getElementById('filter-country').value;
            const identifier = document.getElementById('filter-id').value;
            
            let url = API_URL;
            const params = new URLSearchParams();
            if (country) params.append('country', country);
            if (identifier) params.append('identifier', identifier.toUpperCase());
            
            if (params.toString()) url += '?' + params.toString();
            
            try {
                const response = await fetch(url);
                return await response.json();
            } catch (error) {
                console.error('Error fetching traffic:', error);
                return { features: [] };
            }
        }

        async function fetchFlightPath(identifier) {
            const minutes = document.getElementById('history-minutes').value;
            try {
                const response = await fetch(PATH_API + identifier + '?minutes=' + minutes);
                return await response.json();
            } catch (error) {
                console.error('Error fetching path:', error);
                return { features: [] };
            }
        }

        async function fetchAvailableFlights() {
            const dateInput = document.getElementById('filter-date').value;
            const minutes = document.getElementById('history-minutes').value;
            
            let url = window.location.origin + '/api/v1/flights';
            const params = new URLSearchParams();
            if (dateInput) params.append('date', dateInput);
            params.append('minutes', minutes);
            url += '?' + params.toString();
            
            try {
                const response = await fetch(url);
                return await response.json();
            } catch (error) {
                console.error('Error fetching flights:', error);
                return [];
            }
        }

        async function showFlightList() {
            const flights = await fetchAvailableFlights();
            
            if (!flights || flights.length === 0) {
                alert('No flights found for selected time range');
                return;
            }
            
            const flightsList = flights.slice(0, 50).map(f => 
                `${f.identifier} - ${f.origin_country || 'Unknown'} (${f.point_count} pts)`
            ).join('\n');
            
            const selection = prompt('Select flight ID (copy from list):\n\n' + flightsList);
            if (selection) {
                document.getElementById('filter-id').value = selection.split(' ')[0].trim();
                await refreshMap();
                
                setTimeout(async () => {
                    const features = window.currentFeatures || [];
                    if (features.length > 0) {
                        const flight = features.find(f => f.properties.identifier === selection.split(' ')[0].trim());
                        if (flight) {
                            showPath(flight.properties.identifier);
                        }
                    }
                }, 1000);
            }
        }

        async function onHistoryChange() {
            if (selectedFlightId) {
                await showPath(selectedFlightId);
            }
        }

        function updateMarkers(features) {
            const currentIds = new Set();

            features.forEach(feature => {
                const { identifier, category, velocity, heading, altitude, callsign, origin_country, last_update } = feature.properties;
                const [lng, lat] = feature.geometry.coordinates;

                currentIds.add(identifier);

                const isFlight = category === 'flight';
                const icon = isFlight ? planeIcon : shipIcon;

                let marker = markers.get(identifier);
                if (marker) {
                    marker.setLatLng([lat, lng]);
                    marker.setRotationAngle(heading);
                } else {
                    marker = L.marker([lat, lng], {
                        icon: icon,
                        rotationAngle: heading,
                        rotationOrigin: 'center center',
                        autoClose: false,
                        autoPan: true
                    });
                    
                    const popupContent = `
                        <div style="position: relative; width: 200px; background: transparent; padding: 12px;">
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                                <div style="background: #2563eb; padding: 6px; border-radius: 6px;">
                                    <svg style="width: 14px; height: 14px; color: white;" fill="currentColor" viewBox="0 0 24 24">
                                        ${isFlight 
                                            ? '<path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>'
                                            : '<path d="M20 21c-1.39 0-2.78-.47-4-1.32-2.44-1.71-5.56-1.71-8 0-1.22.85-2.61 1.32-4 1.32v-2c1.38 0 2.74-.35 4-.99 2.52-1.29 5.48-1.29 8 0 1.26.64 2.62.99 4 .99v-2z"/>'
                                        }
                                    </svg>
                                </div>
                                <div>
                                    <div style="font-size: 14px; font-weight: 700; color: white; line-height: 1.2;">${identifier}</div>
                                    <div style="font-size: 9px; color: #94a3b8; font-weight: 500; text-transform: uppercase;">${origin_country || 'Unknown'}</div>
                                </div>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap-y: 6px; gap-x: 6px; margin-bottom: 10px;">
                                <div>
                                    <div style="font-size: 9px; text-transform: uppercase; font-weight: 700; color: #64748b;">Speed</div>
                                    <div style="font-size: 12px; font-weight: 600; color: white;">${(velocity || 0).toFixed(0)} <span style="font-size: 10px; color: #94a3b8;">kts</span></div>
                                </div>
                                <div>
                                    <div style="font-size: 9px; text-transform: uppercase; font-weight: 700; color: #64748b;">Alt</div>
                                    <div style="font-size: 12px; font-weight: 600; color: white;">${(altitude || 0).toFixed(0)} <span style="font-size: 10px; color: #94a3b8;">m</span></div>
                                </div>
                                <div>
                                    <div style="font-size: 9px; text-transform: uppercase; font-weight: 700; color: #64748b;">Hdg</div>
                                    <div style="font-size: 12px; font-weight: 600; color: white;">${heading}°</div>
                                </div>
                                <div>
                                    <div style="font-size: 9px; text-transform: uppercase; font-weight: 700; color: #64748b;">Call</div>
                                    <div style="font-size: 12px; font-weight: 600; color: #60a5fa;">${callsign || '-'}</div>
                                </div>
                            </div>
                            
                            ${isFlight ? `<button class="popup-btn" data-flight-id="${identifier}">Show Path</button>` : ''}
                        </div>
                    `;
                    
                    marker.bindPopup(popupContent, {
                        maxWidth: 240,
                        minWidth: 200,
                        className: 'custom-popup',
                        closeButton: false
                    });
                    marker.addTo(map);
                    markers.set(identifier, marker);
                }
            });

            markers.forEach((marker, id) => {
                if (!currentIds.has(id)) {
                    map.removeLayer(marker);
                    markers.delete(id);
                }
            });
        }

        function updateStats(features) {
            document.getElementById('flight-count').textContent = features.length;
        }

        async function showPath(identifier) {
            selectedFlightId = identifier;
            const data = await fetchFlightPath(identifier);
            
            if (pathLayer) {
                map.removeLayer(pathLayer);
            }
            
            if (data.features.length < 2) {
                alert('Not enough historical data for this flight');
                return;
            }
            
            const coordinates = data.features.map(f => {
                const [lng, lat] = f.geometry.coordinates;
                return [lat, lng];
            });
            
            pathLayer = L.polyline(coordinates, {
                color: '#3B82F6',
                weight: 3,
                opacity: 0.8,
                dashArray: '10, 5'
            }).addTo(map);
            
            map.fitBounds(pathLayer.getBounds(), { padding: [50, 50] });
            
            if (playbackMode) {
                playbackData = data.features;
                startPlayback();
            }
        }

        function togglePlayback() {
            playbackMode = !playbackMode;
            const btn = document.getElementById('play-btn');
            
            if (playbackMode) {
                btn.innerHTML = `<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg> Stop`;
                btn.className = 'btn bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 text-white px-4 py-2 rounded-xl font-medium text-sm w-full flex items-center justify-center gap-2';
                if (playbackData.length > 0) {
                    startPlayback();
                }
            } else {
                btn.innerHTML = `<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Play Path`;
                btn.className = 'btn bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-white px-4 py-2 rounded-xl font-medium text-sm w-full flex items-center justify-center gap-2';
                stopPlayback();
            }
        }

        function startPlayback() {
            if (playbackInterval) clearInterval(playbackInterval);
            
            let index = 0;
            const timeDisplay = document.getElementById('playback-time');
            timeDisplay.classList.remove('hidden');
            
            playbackInterval = setInterval(() => {
                if (index >= playbackData.length) {
                    index = 0;
                }
                
                const point = playbackData[index];
                if (point) {
                    const [lng, lat] = point.geometry.coordinates;
                    const props = point.properties;
                    
                    timeDisplay.textContent = new Date(props.timestamp).toLocaleTimeString();
                    
                    const marker = markers.get(selectedFlightId);
                    if (marker) {
                        marker.setLatLng([lat, lng]);
                        marker.setRotationAngle(props.heading);
                    }
                    
                    if (pathLayer) {
                        const currentBounds = pathLayer.getBounds();
                        if (!currentBounds.contains([lat, lng])) {
                            map.setView([lat, lng], map.getZoom());
                        }
                    }
                    
                    index++;
                }
            }, 500);
        }

        function stopPlayback() {
            if (playbackInterval) {
                clearInterval(playbackInterval);
                playbackInterval = null;
            }
            playbackData = [];
            const timeDisplay = document.getElementById('playback-time');
            timeDisplay.textContent = '';
            timeDisplay.classList.add('hidden');
        }

        async function refreshMap() {
            const data = await fetchTraffic();
            window.currentFeatures = data.features;
            updateMarkers(data.features);
            updateStats(data.features);
        }

        refreshMap();
        setInterval(refreshMap, 30000);
    </script>
</body>
</html>
